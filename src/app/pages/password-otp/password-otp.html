<section class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon-wrap">
        <span class="material-symbols-outlined auth-icon">dialpad</span>
      </div>
      <h2>Verify It's You</h2>
      <p>Enter the 6-digit code sent to your registered email to confirm the password change.</p>
    </div>

    <div class="otp-container">
      <div class="otp-inputs">
        @for (digit of otp; track $index) {
          <input 
            #otpInput
            type="text" 
            maxlength="1" 
            class="otp-box" 
            [(ngModel)]="otp[$index]" 
            (input)="onInput($event, $index)"
            (keydown)="onKeyDown($event, $index)"
            (paste)="onPaste($event)"
          />
        }
      </div>

      @if (errorMsg) {
        <div class="error-banner">{{ errorMsg }}</div>
      }
      
      @if (successMsg) {
        <div class="success-banner">
          <span class="material-symbols-outlined">check_circle</span>
          {{ successMsg }}
        </div>
      }

      <div class="auth-actions">
        <button class="btn-cancel" routerLink="/account/password">Back</button>
        <button class="btn-primary" (click)="verify()" [disabled]="successMsg !== ''">Verify & Change</button>
      </div>
      
      <p class="resend-text">Didn't receive the code? <a href="javascript:void(0)" class="text-accent">Resend</a></p>
    </div>
  </div>
</section>
