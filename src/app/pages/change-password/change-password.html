<section class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon-wrap">
        <span class="material-symbols-outlined auth-icon">lock_reset</span>
      </div>
      <h2>Change Password</h2>
      <p>Secure your account with a new password.</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" [(ngModel)]="currentPassword" name="currentPassword" placeholder="Enter current password" class="form-control" />
      </div>

      <div class="form-group">
        <label>New Password</label>
        <input type="password" [(ngModel)]="newPassword" name="newPassword" placeholder="Enter new password" class="form-control" />
      </div>

      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm new password" class="form-control" />
      </div>

      @if (errorMsg) {
        <div class="error-banner">{{ errorMsg }}</div>
      }

      <div class="auth-actions">
        <button type="button" class="btn-cancel" routerLink="/account">Cancel</button>
        <button type="submit" class="btn-primary">Continue</button>
      </div>
    </form>
  </div>
</section>
